<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Mirror | PIN Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0e0e0e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            color: #D4AF37;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        input {
            background: #000;
            border: 1px solid #444;
            color: #D4AF37;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            width: 200px;
            text-align: center;
            outline: none;
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send {
            background: #D4AF37;
            color: #000;
        }

        .btn-receive {
            background: #333;
            color: #fff;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        video {
            width: 90vw;
            max-width: 1000px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        #status {
            font-size: 14px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div id="ui" class="box">
        <h1>AURA MIRROR</h1>
        <p>Enter a Secret PIN to connect both devices</p>
        <input type="text" id="pinCode" placeholder="Enter PIN (e.g. 8888)" maxlength="10">
        <div class="btn-group">
            <button class="btn-send" onclick="startMirror(true)">Share Screen</button>
            <button class="btn-receive" onclick="startMirror(false)">Watch Mirror</button>
        </div>
        <div id="status">Ready to connect...</div>
    </div>

    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        let peer = null;
        const videoElement = document.getElementById('remoteVideo');
        const statusElement = document.getElementById('status');
        const uiElement = document.getElementById('ui');

        async function startMirror(isSender) {
            const pin = document.getElementById('pinCode').value;
            if (!pin || pin.length < 4) return alert("Please enter at least a 4-digit PIN");

            const uniqueID = "aura-mirror-room-" + pin;

            if (isSender) {
                // --- SENDER LOGIC ---
                statusElement.innerText = "Initializing sender...";
                peer = new Peer(); // Random ID

                peer.on('open', async (id) => {
                    statusElement.innerText = "Requesting screen access...";
                    // Replace the try/catch block inside startMirror(true) with this:
                    try {
                        const stream = await navigator.mediaDevices.getDisplayMedia({
                            video: {
                                width: { ideal: 1920, max: 3840 },  // Requests 1080p, supports up to 4K
                                height: { ideal: 1080, max: 2160 },
                                frameRate: { ideal: 30, max: 60 }    // Smoother movement
                            },
                            audio: false
                        });

                        // PeerJS logic continues here...
                        const call = peer.call(uniqueID, stream);

                        // EXTRA: Ensure the video quality doesn't drop during transmission
                        const videoTrack = stream.getVideoTracks()[0];
                        if (videoTrack.contentHint) {
                            videoTrack.contentHint = 'detail'; // Tells the browser to prioritize clarity over motion
                        }

                        statusElement.innerText = "Broadcasting in High Definition...";
                        uiElement.style.opacity = "0.5";
                    } catch (err) {
                        statusElement.innerText = "Error: " + err.name + " - Check HTTPS/Permissions";
                    }
                });

            } else {
                // --- RECEIVER LOGIC ---
                statusElement.innerText = "Setting up receiver...";
                peer = new Peer(uniqueID); // Uses the PIN as ID

                peer.on('open', (id) => {
                    statusElement.innerText = "Waiting for sender on PIN: " + pin;
                });

                peer.on('call', (call) => {
                    statusElement.innerText = "Incoming stream! Connecting...";
                    call.answer(); // Answer with no stream (receiver only)

                    call.on('stream', (remoteStream) => {
                        statusElement.innerText = "Connected!";
                        uiElement.style.display = "none";
                        videoElement.style.display = "block";
                        videoElement.srcObject = remoteStream;
                    });
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        alert("This PIN is already active. Try a different PIN.");
                    } else {
                        statusElement.innerText = "Peer Error: " + err.type;
                    }
                });
            }
        }
    </script>
</body>

</html>
